version: "3.9"
services:
  app:
    # Option A: full build (includes PDF extraction — slow on first build)
    # build: .

    # Option B: prebuilt db — mount ownership.db via volume (fast, recommended for prod)
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
